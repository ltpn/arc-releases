# This workflow polls releases from actions/runner, moby/moby, and
# actions/runner-container-hooks and in case of a new one it updates the
# default values in .github/workflows/release-runners.yaml and opens a
# pull request.
name: Update Runner Versions (Scheduled)

permissions:
  pull-requests: write
  contents: write

on:
  schedule:
    # run daily
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  # check_versions compares the current default values in release-runners.yaml
  # and the latest available versions, then sets them as outputs.
  check_versions:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      runner_current_version: ${{ steps.runner_versions.outputs.runner_current_version }}
      runner_latest_version: ${{ steps.runner_versions.outputs.runner_latest_version }}
      docker_current_version: ${{ steps.docker_versions.outputs.docker_current_version }}
      docker_latest_version: ${{ steps.docker_versions.outputs.docker_latest_version }}
      container_hooks_current_version: ${{ steps.container_hooks_versions.outputs.container_hooks_current_version }}
      container_hooks_latest_version: ${{ steps.container_hooks_versions.outputs.container_hooks_latest_version }}
    steps:
      - uses: actions/checkout@v3

      - name: Get runner current and latest versions
        id: runner_versions
        run: |
          CURRENT_VERSION=$(grep -A4 'runner_version:' .github/workflows/release-runners.yaml | grep 'default:' | grep -oP "default: '\K[^']+")
          echo "Current runner version: $CURRENT_VERSION"
          echo "runner_current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          LATEST_VERSION=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 -R actions/runner | grep -oP '(?<=v)[0-9.]+' | head -1)
          echo "Latest runner version: $LATEST_VERSION"
          echo "runner_latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT

      - name: Get docker current and latest versions
        id: docker_versions
        run: |
          CURRENT_VERSION=$(grep -A4 'docker_version:' .github/workflows/release-runners.yaml | grep 'default:' | grep -oP "default: '\K[^']+")
          echo "Current docker version: $CURRENT_VERSION"
          echo "docker_current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          LATEST_VERSION=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 -R moby/moby | grep -oP '(?<=v)[0-9.]+' | head -1)
          echo "Latest docker version: $LATEST_VERSION"
          echo "docker_latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT

      - name: Get container-hooks current and latest versions
        id: container_hooks_versions
        run: |
          CURRENT_VERSION=$(grep -A4 'runner_container_hooks_version:' .github/workflows/release-runners.yaml | grep 'default:' | grep -oP "default: '\K[^']+")
          echo "Current container-hooks version: $CURRENT_VERSION"
          echo "container_hooks_current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          LATEST_VERSION=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 -R actions/runner-container-hooks | grep -oP '(?<=v)[0-9.]+' | head -1)
          echo "Latest container-hooks version: $LATEST_VERSION"
          echo "container_hooks_latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT

  # check_pr checks if a PR for the same update already exists. It only runs if
  # any version differs from the current one. If no existing PR is found,
  # it sets a PR name as output.
  check_pr:
    runs-on: ubuntu-latest
    needs: check_versions
    if: |
      needs.check_versions.outputs.runner_current_version != needs.check_versions.outputs.runner_latest_version ||
      needs.check_versions.outputs.docker_current_version != needs.check_versions.outputs.docker_latest_version ||
      needs.check_versions.outputs.container_hooks_current_version != needs.check_versions.outputs.container_hooks_latest_version
    outputs:
      pr_name: ${{ steps.pr_name.outputs.pr_name }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v3

      - name: PR Name
        id: pr_name
        env:
          RUNNER_CURRENT_VERSION: ${{ needs.check_versions.outputs.runner_current_version }}
          RUNNER_LATEST_VERSION: ${{ needs.check_versions.outputs.runner_latest_version }}
          DOCKER_CURRENT_VERSION: ${{ needs.check_versions.outputs.docker_current_version }}
          DOCKER_LATEST_VERSION: ${{ needs.check_versions.outputs.docker_latest_version }}
          CONTAINER_HOOKS_CURRENT_VERSION: ${{ needs.check_versions.outputs.container_hooks_current_version }}
          CONTAINER_HOOKS_LATEST_VERSION: ${{ needs.check_versions.outputs.container_hooks_latest_version }}
        run: |
          PR_NAME="Updates:"
          if [ "$RUNNER_CURRENT_VERSION" != "$RUNNER_LATEST_VERSION" ]; then
            PR_NAME="$PR_NAME runner to v${RUNNER_LATEST_VERSION}"
          fi
          if [ "$DOCKER_CURRENT_VERSION" != "$DOCKER_LATEST_VERSION" ]; then
            PR_NAME="$PR_NAME docker to v${DOCKER_LATEST_VERSION}"
          fi
          if [ "$CONTAINER_HOOKS_CURRENT_VERSION" != "$CONTAINER_HOOKS_LATEST_VERSION" ]; then
            PR_NAME="$PR_NAME container-hooks to v${CONTAINER_HOOKS_LATEST_VERSION}"
          fi

          result=$(gh pr list --search "$PR_NAME" --json number --jq ".[].number" --limit 1)
          if [ -z "$result" ]; then
            echo "No existing PRs found, setting output with pr_name=$PR_NAME"
            echo "pr_name=$PR_NAME" >> $GITHUB_OUTPUT
          else
            echo "Found a PR with title '$PR_NAME' already existing: ${{ github.server_url }}/${{ github.repository }}/pull/$result"
          fi

  # update_version updates the default values in release-runners.yaml, commits
  # the changes and opens a pull request as the `github-actions` bot.
  update_version:
    runs-on: ubuntu-latest
    needs:
      - check_versions
      - check_pr
    if: needs.check_pr.outputs.pr_name
    permissions:
      pull-requests: write
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RUNNER_CURRENT_VERSION: ${{ needs.check_versions.outputs.runner_current_version }}
      RUNNER_LATEST_VERSION: ${{ needs.check_versions.outputs.runner_latest_version }}
      DOCKER_CURRENT_VERSION: ${{ needs.check_versions.outputs.docker_current_version }}
      DOCKER_LATEST_VERSION: ${{ needs.check_versions.outputs.docker_latest_version }}
      CONTAINER_HOOKS_CURRENT_VERSION: ${{ needs.check_versions.outputs.container_hooks_current_version }}
      CONTAINER_HOOKS_LATEST_VERSION: ${{ needs.check_versions.outputs.container_hooks_latest_version }}
      PR_NAME: ${{ needs.check_pr.outputs.pr_name }}

    steps:
      - uses: actions/checkout@v3

      - name: New branch
        run: git checkout -b update-runner-versions-"$(date +%Y-%m-%d)"

      - name: Update default values in release-runners.yaml
        run: |
          FILE=".github/workflows/release-runners.yaml"

          if [ "$RUNNER_CURRENT_VERSION" != "$RUNNER_LATEST_VERSION" ]; then
            ESCAPED_CURRENT="${RUNNER_CURRENT_VERSION//./\\.}"
            sed -i "/runner_version:/,/default:/ s/default: '${ESCAPED_CURRENT}'/default: '${RUNNER_LATEST_VERSION}'/" "$FILE"
          fi

          if [ "$DOCKER_CURRENT_VERSION" != "$DOCKER_LATEST_VERSION" ]; then
            ESCAPED_CURRENT="${DOCKER_CURRENT_VERSION//./\\.}"
            sed -i "/docker_version:/,/default:/ s/default: '${ESCAPED_CURRENT}'/default: '${DOCKER_LATEST_VERSION}'/" "$FILE"
          fi

          if [ "$CONTAINER_HOOKS_CURRENT_VERSION" != "$CONTAINER_HOOKS_LATEST_VERSION" ]; then
            ESCAPED_CURRENT="${CONTAINER_HOOKS_CURRENT_VERSION//./\\.}"
            sed -i "/runner_container_hooks_version:/,/default:/ s/default: '${ESCAPED_CURRENT}'/default: '${CONTAINER_HOOKS_LATEST_VERSION}'/" "$FILE"
          fi

      - name: Commit changes
        run: |
          # from https://github.com/orgs/community/discussions/26560
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .github/workflows/release-runners.yaml
          git commit -m "$PR_NAME"
          git push -u origin HEAD

      - name: Create pull request
        run: gh pr create -f -l "runners update"
